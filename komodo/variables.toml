[[variable]]
name = "PLEX_CONFIG_PATH"
description = "Plex config bind mount path."
value = "/srv/server/config/plex"
is_secret = false

[[variable]]
name = "TRANSCODE_PATH"
description = "Plex transcode bind mount path."
value = "/srv/server/cache/plex-transcode"
is_secret = false

[[variable]]
name = "MEDIA_PATH"
description = "Shared media root for Plex and Transmission."
value = "/srv/server/media"
is_secret = false

[[variable]]
name = "TRANSMISSION_CONFIG_PATH"
description = "Transmission config bind mount path."
value = "/srv/server/config/transmission"
is_secret = false

[[variable]]
name = "WIREGUARD_CONFIG_FILE"
description = "WireGuard client config file path for the media VPN gateway."
value = "/srv/server/config/wireguard/home-server-LT-37.conf"
is_secret = false

[[variable]]
name = "VPN_OUTBOUND_SUBNETS"
description = "LAN and Docker subnets Gluetun should keep reachable outside the VPN tunnel."
value = "192.168.0.0/16,172.16.0.0/12"
is_secret = false

[[variable]]
name = "TRANSMISSION_USER_PASSWORD_FILE"
description = "Transmission password secret file path."
value = "/srv/server/config/transmission/transmission_user_password.txt"
is_secret = false

# NGROK_AUTHTOKEN is intentionally not Git-managed. Create it as a secret
# Komodo variable before deploying the ngrok Stack.

[[variable]]
name = "NGROK_INSPECT_PORT"
description = "Host port for the local ngrok inspection UI and API."
value = "4040"
is_secret = false

[[variable]]
name = "NGROK_DOCKER_NETWORK"
description = "Docker network shared by ngrok, Traefik, and Komodo."
value = "portainer_network"
is_secret = false
