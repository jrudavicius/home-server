[[stack]]
name = "entrypoint"
description = "Traefik reverse proxy and local home server landing page."
tags = ["entrypoint", "home"]
deploy = true

[stack.config]
server = "home-server"
files_on_host = false
git_provider = "github.com"
git_https = true
repo = "jrudavicius/home-server"
branch = "main"
run_directory = "stacks/entrypoint"
file_paths = ["docker-compose.yml"]
config_files = [
  { path = "traefik/dynamic.yml", services = ["traefik"], requires = "None" },
  { path = "entrypoint/index.html.template", services = ["entrypoint"], requires = "Restart" },
]
project_name = "entrypoint"
auto_pull = true
webhook_enabled = true
webhook_force_deploy = true
environment = """
TRAEFIK_HTTP_PORT=80
TRAEFIK_DASHBOARD_HOST=traefik.home.arpa
TRAEFIK_LOG_LEVEL=INFO

ENTRYPOINT_TITLE=Home Server
ENTRYPOINT_SUBTITLE=Raspberry Pi services
ENTRYPOINT_KOMODO_URL=
ENTRYPOINT_PLEX_URL=
ENTRYPOINT_GRAFANA_URL=
ENTRYPOINT_TRAEFIK_URL=
ENTRYPOINT_TRANSMISSION_URL=

GRAFANA_PORT=3000
GRAFANA_TRAEFIK_HOST=grafana.home.arpa
KOMODO_PORT=9120
KOMODO_TRAEFIK_HOST=komodo.home.arpa
PLEX_PORT=32400
PLEX_TRAEFIK_HOST=plex.home.arpa
TRANSMISSION_WEB_PORT=9091
TRANSMISSION_TRAEFIK_HOST=transmission.home.arpa
"""

[[stack]]
name = "observability"
description = "Grafana, Loki, and Alloy for Docker container log search."
tags = ["observability", "logs", "home"]
deploy = true
after = ["entrypoint"]

[stack.config]
server = "home-server"
files_on_host = false
git_provider = "github.com"
git_https = true
repo = "jrudavicius/home-server"
branch = "main"
run_directory = "stacks/observability"
file_paths = ["docker-compose.yml"]
project_name = "observability"
auto_pull = true
webhook_enabled = true
webhook_force_deploy = true
environment = """
GRAFANA_IMAGE_TAG=13.1.0
LOKI_IMAGE_TAG=3.7.0
ALLOY_IMAGE_TAG=v1.17.0

GRAFANA_PORT=3000
GRAFANA_TRAEFIK_HOST=grafana.home.arpa
GRAFANA_ROOT_URL=http://grafana.home.arpa/
GRAFANA_ADMIN_USER=admin
GRAFANA_ADMIN_PASSWORD=[[GRAFANA_ADMIN_PASSWORD]]
GRAFANA_PLUGINS_PREINSTALL_DISABLED=true
GRAFANA_PLUGINS_PREINSTALL_AUTO_UPDATE=false

LOKI_RETENTION_PERIOD=168h
LOKI_MAX_QUERY_LOOKBACK=168h

DOCKER_SOCKET_PATH=/var/run/docker.sock
"""

[[stack]]
name = "media"
description = "Plex Media Server and Transmission torrent client."
tags = ["media-services", "home"]
deploy = true
after = ["entrypoint"]

[stack.config]
server = "home-server"
files_on_host = false
git_provider = "github.com"
git_https = true
repo = "jrudavicius/home-server"
branch = "main"
run_directory = "stacks/media"
file_paths = ["docker-compose.yml"]
project_name = "media"
auto_pull = true
webhook_enabled = true
webhook_force_deploy = true
environment = """
PLEX_PORT=32400
PLEX_TRAEFIK_HOST=plex.home.arpa
PLEX_CLAIM=
PLEX_CONFIG_PATH=[[PLEX_CONFIG_PATH]]
TRANSCODE_PATH=[[TRANSCODE_PATH]]
MEDIA_PATH=[[MEDIA_PATH]]

TRANSMISSION_WEB_PORT=9091
TRANSMISSION_PEER_PORT=51413
TRANSMISSION_TRAEFIK_HOST=transmission.home.arpa
TRANSMISSION_USERNAME=julius
TRANSMISSION_CONFIG_PATH=[[TRANSMISSION_CONFIG_PATH]]
TRANSMISSION_USER_PASSWORD_FILE=[[TRANSMISSION_USER_PASSWORD_FILE]]
"""

[[stack]]
name = "ngrok"
description = "ngrok tunnel for external access and GitHub webhook delivery."
tags = ["network", "webhooks", "home"]
deploy = true

[stack.config]
server = "home-server"
files_on_host = false
git_provider = "github.com"
git_https = true
repo = "jrudavicius/home-server"
branch = "main"
run_directory = "stacks/ngrok"
file_paths = ["docker-compose.yml"]
project_name = "ngrok"
auto_pull = true
webhook_enabled = true
webhook_force_deploy = true
environment = """
NGROK_AUTHTOKEN=[[NGROK_AUTHTOKEN]]
NGROK_DOMAIN=[[NGROK_DOMAIN]]
NGROK_INSPECT_PORT=[[NGROK_INSPECT_PORT]]
NGROK_DOCKER_NETWORK=[[NGROK_DOCKER_NETWORK]]
NGROK_TUNNEL_TARGET=[[NGROK_TUNNEL_TARGET]]
"""
