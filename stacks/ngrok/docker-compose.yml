services:
  ngrok:
    container_name: home-server-ngrok
    image: ngrok/ngrok:3
    restart: unless-stopped
    command:
      - start
      - --all
      - --config
      - /etc/ngrok/ngrok.yml
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?Set NGROK_AUTHTOKEN}
    volumes:
      - ./ngrok.yml:/etc/ngrok/ngrok.yml:ro
    ports:
      - "${NGROK_INSPECT_PORT:-4040}:4040"

networks:
  default:
    external: true
    name: ${NGROK_DOCKER_NETWORK:-portainer_network}
