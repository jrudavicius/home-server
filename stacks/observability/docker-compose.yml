services:
  loki:
    container_name: observability-loki
    image: grafana/loki:${LOKI_IMAGE_TAG:-3.7.0}
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki.yml
      - -config.expand-env=true
    environment:
      LOKI_RETENTION_PERIOD: ${LOKI_RETENTION_PERIOD:-168h}
      LOKI_MAX_QUERY_LOOKBACK: ${LOKI_MAX_QUERY_LOOKBACK:-168h}
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki

  alloy:
    container_name: observability-alloy
    image: grafana/alloy:${ALLOY_IMAGE_TAG:-v1.17.0}
    restart: unless-stopped
    depends_on:
      - loki
    command:
      - run
      - --disable-reporting
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy
      - "${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro"

  grafana:
    container_name: observability-grafana
    image: grafana/grafana:${GRAFANA_IMAGE_TAG:-13.1.0}
    restart: unless-stopped
    depends_on:
      - loki
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://grafana.home.arpa/}
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: Europe/Vilnius
      GF_PLUGINS_PREINSTALL_DISABLED: ${GRAFANA_PLUGINS_PREINSTALL_DISABLED:-true}
      GF_PLUGINS_PREINSTALL_AUTO_UPDATE: ${GRAFANA_PLUGINS_PREINSTALL_AUTO_UPDATE:-false}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

networks:
  default:
    external: true
    name: portainer_network

volumes:
  alloy-data:
  grafana-data:
  loki-data:
