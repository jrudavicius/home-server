services:
  vpn:
    container_name: media-vpn
    image: qmcgaw/gluetun:${VPN_IMAGE_TAG:-v3.41.1}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "${TRANSMISSION_WEB_PORT:-9091}:9091"
    environment:
      TZ: Europe/Vilnius
      VPN_SERVICE_PROVIDER: custom
      VPN_TYPE: wireguard
      FIREWALL_INPUT_PORTS: "9091"
      FIREWALL_OUTBOUND_SUBNETS: ${VPN_OUTBOUND_SUBNETS:-192.168.0.0/16,172.16.0.0/12}
      FIREWALL_VPN_INPUT_PORTS: ${TRANSMISSION_PEER_PORT:-51413}
    secrets:
      - source: wireguard_config
        target: /gluetun/wireguard/wg0.conf
        mode: 0440

  plex:
    container_name: media-server
    image: plexinc/pms-docker:1.42.2.10156-f737b826c
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.plex.rule: "Host(`${PLEX_TRAEFIK_HOST:-plex.home.arpa}`)"
      traefik.http.routers.plex.entrypoints: web
      traefik.http.routers.plex.priority: "20"
      traefik.http.services.plex.loadbalancer.server.port: "32400"
    ports:
      - "${PLEX_PORT:?Set PLEX_PORT}:32400"
    environment:
      - PLEX_UID=1000
      - PLEX_GID=1000
      - TZ=Europe/Vilnius
      - PLEX_CLAIM=${PLEX_CLAIM:-}
    volumes:
      - "${PLEX_CONFIG_PATH:?Set PLEX_CONFIG_PATH}:/config"
      - "${TRANSCODE_PATH:?Set TRANSCODE_PATH}:/transcode"
      - "${MEDIA_PATH:?Set MEDIA_PATH}:/data"

  transmission:
    container_name: torrent-client
    image: lscr.io/linuxserver/transmission:4.0.6
    restart: unless-stopped
    depends_on:
      - vpn
    network_mode: "service:vpn"
    labels:
      traefik.enable: "true"
      traefik.http.routers.transmission.rule: "Host(`${TRANSMISSION_TRAEFIK_HOST:-transmission.home.arpa}`)"
      traefik.http.routers.transmission.entrypoints: web
      traefik.http.routers.transmission.priority: "20"
      traefik.http.services.transmission.loadbalancer.server.port: "9091"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Vilnius
      - USER=${TRANSMISSION_USERNAME:?Set TRANSMISSION_USERNAME}
      - FILE__PASS=/run/secrets/transmission_user_password
      - PEERPORT=${TRANSMISSION_PEER_PORT:-51413}
    volumes:
      - "${TRANSMISSION_CONFIG_PATH:?Set TRANSMISSION_CONFIG_PATH}:/config"
      - "${MEDIA_PATH:?Set MEDIA_PATH}:/media"
      - "${MEDIA_PATH:?Set MEDIA_PATH}/watch:/watch"
    secrets:
      - transmission_user_password

secrets:
  transmission_user_password:
    file: ${TRANSMISSION_USER_PASSWORD_FILE:?Set TRANSMISSION_USER_PASSWORD_FILE}
  wireguard_config:
    file: ${WIREGUARD_CONFIG_FILE:?Set WIREGUARD_CONFIG_FILE}

networks:
  default:
    external: true
    name: portainer_network
